<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 900" width="440" height="900" role="img"><title>Component wireframe: Trigger Event Setup, choose a trigger event</title><rect width="440" height="900" fill="#FFFFFF"/><rect x="10" y="10" width="420" height="880" rx="12" fill="#FFFFFF" stroke="#D8D8D8" stroke-width="1.2"/><path d="M36 62 l-7 0 M32 58 l-4 4 4 4" stroke="#3D3D3D" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="46" y="66" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="700" fill="#3D3D3D" text-anchor="start">Back to Trigger Types</text><text x="30" y="106" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="700" fill="#111111" text-anchor="start">When this happens…</text><rect x="30" y="124" width="380" height="40" rx="8" fill="#FFFFFF" stroke="#D8D8D8" stroke-width="1.2"/><rect x="42" y="132" width="24" height="24" rx="7" fill="#FFFFFF" stroke="#D8D8D8" stroke-width="1.2"/><rect x="48.72" y="138.72" width="10.56" height="10.56" rx="2" fill="none" stroke="#8A8A8A" stroke-width="1.2"/><text x="78" y="149" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="700" fill="#111111" text-anchor="start">Forms Trigger</text><text x="394" y="150" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#3D3D3D" text-anchor="start">✕</text><text x="77.5" y="200" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="700" fill="#111111" text-anchor="middle">Setup</text><text x="172.5" y="200" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="500" fill="#8A8A8A" text-anchor="middle">Filters</text><text x="267.5" y="200" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="500" fill="#8A8A8A" text-anchor="middle">Conditions</text><text x="362.5" y="200" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="500" fill="#8A8A8A" text-anchor="middle">Test</text><path d="M30 212 L410 212" stroke="#E8E8E8" stroke-width="1.2" fill="none"/><rect x="43.5" y="210" width="68" height="2.5" rx="1.2" fill="#111111"/><text x="30" y="254" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700" fill="#111111" text-anchor="start">Choose a Trigger Event</text><rect x="30" y="276" width="380" height="52" rx="8" fill="#FFFFFF" stroke="#D8D8D8" stroke-width="1.2"/><circle cx="50" cy="302" r="7" fill="none" stroke="#8A8A8A" stroke-width="1.2"/><text x="68" y="300" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="600" fill="#111111" text-anchor="start">New Form Submission</text><text x="68" y="314" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9.4" font-weight="500" fill="#8A8A8A" text-anchor="start">Triggers when a user submits a new form</text><rect x="30" y="338" width="380" height="52" rx="8" fill="#FFFFFF" stroke="#D8D8D8" stroke-width="1.2"/><circle cx="50" cy="364" r="7" fill="none" stroke="#8A8A8A" stroke-width="1.2"/><text x="68" y="362" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="600" fill="#111111" text-anchor="start">Partial Form Submission</text><text x="68" y="376" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9.4" font-weight="500" fill="#8A8A8A" text-anchor="start">Triggers when a user saves a partially completed form</text><rect x="30" y="400" width="380" height="52" rx="8" fill="#FFFFFF" stroke="#D8D8D8" stroke-width="1.2"/><circle cx="50" cy="426" r="7" fill="none" stroke="#8A8A8A" stroke-width="1.2"/><text x="68" y="424" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="600" fill="#111111" text-anchor="start">Form Deadline Reached</text><text x="68" y="438" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9.4" font-weight="500" fill="#8A8A8A" text-anchor="start">Triggers when a form submission deadline is reached</text><rect x="30" y="462" width="380" height="52" rx="8" fill="#FFFFFF" stroke="#D8D8D8" stroke-width="1.2"/><circle cx="50" cy="488" r="7" fill="none" stroke="#8A8A8A" stroke-width="1.2"/><text x="68" y="486" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="600" fill="#111111" text-anchor="start">Abandoned Form</text><text x="68" y="500" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9.4" font-weight="500" fill="#8A8A8A" text-anchor="start">Triggers when user starts filling out a form but abandons it</text><rect x="30" y="524" width="380" height="52" rx="8" fill="#FFFFFF" stroke="#D8D8D8" stroke-width="1.2"/><circle cx="50" cy="550" r="7" fill="none" stroke="#8A8A8A" stroke-width="1.2"/><text x="68" y="548" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="600" fill="#111111" text-anchor="start">Updated Form</text><text x="68" y="562" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9.4" font-weight="500" fill="#8A8A8A" text-anchor="start">Triggers when a user updates or modifies an existing form</text><rect x="30" y="586" width="380" height="52" rx="8" fill="#FFFFFF" stroke="#D8D8D8" stroke-width="1.2"/><circle cx="50" cy="612" r="7" fill="none" stroke="#8A8A8A" stroke-width="1.2"/><text x="68" y="610" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="600" fill="#111111" text-anchor="start">Form Approval</text><text x="68" y="624" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9.4" font-weight="500" fill="#8A8A8A" text-anchor="start">Triggers when a user approves or rejects a form submission</text><rect x="30" y="648" width="380" height="52" rx="8" fill="#FFFFFF" stroke="#D8D8D8" stroke-width="1.2"/><circle cx="50" cy="674" r="7" fill="none" stroke="#8A8A8A" stroke-width="1.2"/><text x="68" y="672" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="600" fill="#111111" text-anchor="start">New Form Creation</text><text x="68" y="686" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9.4" font-weight="500" fill="#8A8A8A" text-anchor="start">Triggers when a user creates a new form</text><rect x="30" y="710" width="380" height="52" rx="8" fill="#FFFFFF" stroke="#D8D8D8" stroke-width="1.2"/><circle cx="50" cy="736" r="7" fill="none" stroke="#8A8A8A" stroke-width="1.2"/><text x="68" y="734" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="600" fill="#111111" text-anchor="start">Form Input Completion</text><text x="68" y="748" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9.4" font-weight="500" fill="#8A8A8A" text-anchor="start">Triggers when a user completes a specific field or input</text><rect x="30" y="772" width="380" height="52" rx="8" fill="#FFFFFF" stroke="#D8D8D8" stroke-width="1.2"/><circle cx="50" cy="798" r="7" fill="none" stroke="#8A8A8A" stroke-width="1.2"/><text x="68" y="796" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="600" fill="#111111" text-anchor="start">Specific Form Field</text><text x="68" y="810" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9.4" font-weight="500" fill="#8A8A8A" text-anchor="start">Triggers when a user enters specific data into a form field</text></svg>
