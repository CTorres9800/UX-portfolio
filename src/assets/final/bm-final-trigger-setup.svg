<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1240" width="900" height="1240" role="img"><title>Final feature: Trigger and Action Setup — event selection, required fields and account connection</title><rect width="900" height="1240" fill="#FFFFFF"/><rect x="24" y="24" width="852" height="1192" rx="12" fill="#FFFFFF" stroke="#DCDCDC" stroke-width="1.2"/><path d="M70 76 l-10 0 M64 70 l-6 6 6 6" stroke="#3F3F3F" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="84" y="81" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="12.5" font-weight="700" fill="#3F3F3F" text-anchor="start">Back to Trigger Types</text><text x="60" y="128" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="19" font-weight="700" fill="#111111" text-anchor="start">When this happens…</text><rect x="60" y="148" width="780" height="56" rx="8" fill="#FFFFFF" stroke="#DCDCDC" stroke-width="1.2"/><rect x="74" y="161" width="30" height="30" rx="6" fill="#FFFFFF" stroke="#DCDCDC" stroke-width="1.2"/><rect x="81.8" y="168.8" width="14.399999999999999" height="14.399999999999999" rx="2" fill="#DEDEDE" stroke="none" stroke-width="1.2"/><text x="118" y="182" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="13.5" font-weight="700" fill="#111111" text-anchor="start">Forms Trigger</text><text x="820" y="182" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="500" fill="#3F3F3F" text-anchor="middle">✕</text><path d="M60 250 L840 250" stroke="#EBEBEB" stroke-width="1.2" fill="none"/><text x="190" y="244" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="700" fill="#111111" text-anchor="middle">Setup</text><rect x="72" y="248" width="236" height="2.5" rx="1.2" fill="#111111"/><text x="450" y="244" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="500" fill="#8C8C8C" text-anchor="middle">Conditions</text><text x="710" y="244" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="500" fill="#8C8C8C" text-anchor="middle">Test</text><text x="60" y="292" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="700" fill="#111111" text-anchor="start">Choose a Trigger Event</text><rect x="60" y="310" width="780" height="44" rx="7" fill="#FFFFFF" stroke="#111111" stroke-width="1.8"/><circle cx="78" cy="332" r="7" fill="none" stroke="#111111" stroke-width="1.2"/><circle cx="78" cy="332" r="3.4" fill="#111111" stroke="#111111" stroke-width="1.2"/><text x="96" y="329" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="600" fill="#111111" text-anchor="start">New Form Submission</text><text x="96" y="343" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9.6" font-weight="500" fill="#8C8C8C" text-anchor="start">Triggers when a user submits a new form</text><rect x="60" y="372" width="780" height="44" rx="7" fill="#FFFFFF" stroke="#DCDCDC" stroke-width="1.2"/><circle cx="78" cy="394" r="7" fill="none" stroke="#8C8C8C" stroke-width="1.2"/><text x="96" y="391" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="600" fill="#111111" text-anchor="start">Partial Form Submission</text><text x="96" y="405" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9.6" font-weight="500" fill="#8C8C8C" text-anchor="start">Triggers when a user saves a partially completed form</text><rect x="60" y="434" width="780" height="44" rx="7" fill="#FFFFFF" stroke="#DCDCDC" stroke-width="1.2"/><circle cx="78" cy="456" r="7" fill="none" stroke="#8C8C8C" stroke-width="1.2"/><text x="96" y="453" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="600" fill="#111111" text-anchor="start">Form Deadline Reached</text><text x="96" y="467" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9.6" font-weight="500" fill="#8C8C8C" text-anchor="start">Triggers when a form submission deadline is reached</text><rect x="60" y="496" width="780" height="44" rx="7" fill="#FFFFFF" stroke="#DCDCDC" stroke-width="1.2"/><circle cx="78" cy="518" r="7" fill="none" stroke="#8C8C8C" stroke-width="1.2"/><text x="96" y="515" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="600" fill="#111111" text-anchor="start">Abandoned Form</text><text x="96" y="529" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9.6" font-weight="500" fill="#8C8C8C" text-anchor="start">Triggers when a user starts a form but abandons it</text><rect x="60" y="558" width="780" height="44" rx="7" fill="#FFFFFF" stroke="#DCDCDC" stroke-width="1.2"/><circle cx="78" cy="580" r="7" fill="none" stroke="#8C8C8C" stroke-width="1.2"/><text x="96" y="577" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="600" fill="#111111" text-anchor="start">Updated Form</text><text x="96" y="591" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9.6" font-weight="500" fill="#8C8C8C" text-anchor="start">Triggers when a user modifies an existing form</text><rect x="60" y="620" width="780" height="44" rx="7" fill="#FFFFFF" stroke="#DCDCDC" stroke-width="1.2"/><circle cx="78" cy="642" r="7" fill="none" stroke="#8C8C8C" stroke-width="1.2"/><text x="96" y="639" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="600" fill="#111111" text-anchor="start">Form Approval</text><text x="96" y="653" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9.6" font-weight="500" fill="#8C8C8C" text-anchor="start">Triggers when a user approves or rejects a submission</text><text x="60" y="718" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="700" fill="#111111" text-anchor="start">Choose Form</text><text x="142" y="718" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="500" fill="#8C8C8C" text-anchor="start">*required</text><rect x="60" y="730" width="780" height="44" rx="7" fill="#FFFFFF" stroke="#DCDCDC" stroke-width="1.2"/><text x="74" y="757" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="500" fill="#8C8C8C" text-anchor="start">Select a form</text><path d="M810 748 l4 4.6 4 -4.6" stroke="#3F3F3F" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="60" y="812" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="700" fill="#111111" text-anchor="start">Connect your account</text><rect x="60" y="830" width="780" height="64" rx="8" fill="#FFFFFF" stroke="#DCDCDC" stroke-width="1.2"/><rect x="76" y="847" width="30" height="30" rx="6" fill="#FFFFFF" stroke="#DCDCDC" stroke-width="1.2"/><rect x="83.8" y="854.8" width="14.399999999999999" height="14.399999999999999" rx="2" fill="#DEDEDE" stroke="none" stroke-width="1.2"/><text x="120" y="858" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="12.5" font-weight="700" fill="#111111" text-anchor="start">Connect your Gmail account</text><text x="120" y="876" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="10.5" font-weight="500" fill="#8C8C8C" text-anchor="start">Not connected</text><rect x="724" y="847" width="96" height="30" rx="7" fill="#FFFFFF" stroke="#DCDCDC" stroke-width="1.2"/><text x="772" y="866.2" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="700" fill="#111111" text-anchor="middle">+  Connect</text><text x="60" y="926" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="10.5" font-weight="500" fill="#8C8C8C" text-anchor="start">Gmail is a secure partner with Blend Metrics. Your credentials are</text><text x="60" y="944" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="10.5" font-weight="500" fill="#8C8C8C" text-anchor="start">encrypted and can be removed at any time.</text><path d="M60 986 L840 986" stroke="#EBEBEB" stroke-width="1.2" fill="none"/><text x="60" y="1020" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11.5" font-weight="700" fill="#111111" text-anchor="start">Setup</text><circle cx="112" cy="1016" r="6" fill="#FFFFFF" stroke="#3F3F3F" stroke-width="1.6"/><path d="M108.2 1016 l2.6 2.7 4.9 -5.2" stroke="#3F3F3F" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><rect x="60" y="1036" width="780" height="44" rx="7" fill="#FFFFFF" stroke="#DCDCDC" stroke-width="1.2"/><rect x="74" y="1052" width="90" height="10" rx="5" fill="#DEDEDE" stroke="none" stroke-width="1.2"/><rect x="60" y="1096" width="780" height="44" rx="7" fill="#FFFFFF" stroke="#DCDCDC" stroke-width="1.2"/><rect x="74" y="1112" width="90" height="10" rx="5" fill="#DEDEDE" stroke="none" stroke-width="1.2"/><rect x="724" y="1160" width="96" height="34" rx="7" fill="#1C1C1C" stroke="#1C1C1C" stroke-width="1.2"/><text x="772" y="1181.2" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">Continue</text><rect x="0.6" y="0.6" width="898.8" height="1238.8" rx="6" fill="none" stroke="#EBEBEB"/></svg>
