<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 357 192" width="357" height="192" role="img"><title>Where time is lost</title><text x="0" y="11" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="700" fill="#111111" text-anchor="start">Working out why a step failed</text><rect x="0" y="20" width="297" height="13" rx="6.5" fill="#F1F1F1"/><rect x="0" y="20" width="297" height="13" rx="6.5" fill="#306CFE"/><text x="319" y="30" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9.5" font-weight="500" fill="#8C8C8C" text-anchor="end">12</text><text x="357" y="30" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="700" fill="#306CFE" text-anchor="end">35%</text><text x="0" y="61" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#3F3F3F" text-anchor="start">Setting up conditions, branches</text><rect x="0" y="70" width="297" height="13" rx="6.5" fill="#F1F1F1"/><rect x="0" y="70" width="220.62857142857143" height="13" rx="6.5" fill="#B9CCFE"/><text x="319" y="80" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9.5" font-weight="500" fill="#8C8C8C" text-anchor="end">9</text><text x="357" y="80" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="700" fill="#8C8C8C" text-anchor="end">26%</text><text x="0" y="111" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#3F3F3F" text-anchor="start">Finding the right trigger or action</text><rect x="0" y="120" width="297" height="13" rx="6.5" fill="#F1F1F1"/><rect x="0" y="120" width="178.2" height="13" rx="6.5" fill="#B9CCFE"/><text x="319" y="130" font-family="DM Sans, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9.5" font-weight="500" fill="#8C8C8C" text-anchor="end">7</text><text x="357" y="130" font-f